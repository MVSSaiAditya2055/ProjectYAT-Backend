server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/yatdb1}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT Configuration ────────────────────────────────────────────────────────────
# IMPORTANT: Change jwt.secret-key to a strong random value in production!
# Generate with: `openssl rand -base64 32`
jwt.secret-key=${JWT_SECRET:your-super-secret-key-change-this-in-production-with-openssl-rand-base64-32}
# Access token expires in 15 minutes (in milliseconds)
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:900000}
# Refresh token expires in 7 days (in milliseconds)
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:604800000}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:saiadityamvs27.ai@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── File Storage ──────────────────────────────────────────────────────────────
# Paths are relative to the backend project root
file.upload.assignments-dir=${user.dir}/uploads/assignments
file.upload.submissions-dir=${user.dir}/uploads/submissions
file.upload.videos-dir=${user.dir}/uploads/videos

# ── Multipart / File upload limits ────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── CORS ─────────────────────────────────────────────────────────────────────
# Add frontend domains (comma-separated) to allow browser calls to backend APIs.
app.cors.allowed-origin-patterns=https://courseminds-projectyat.netlify.app,https://*.netlify.app,http://localhost:*,http://127.0.0.1:*